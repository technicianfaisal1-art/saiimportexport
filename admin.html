<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SAI Import Export Agro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Supabase CDN is loaded before admin scripts at bottom of body -->
    
    <style>
        * { box-sizing: border-box; }
        body { background: #f4f6f4; }
        .admin-container { max-width: 1200px; margin: 20px auto; padding: 10px; }
        
        /* Login Screen */
        #login-screen { max-width: 400px; margin: 60px auto; background: white; padding: 30px 20px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #login-screen h2 { text-align: center; margin-bottom: 16px; color: var(--green-dark); font-size: 1.4rem; }
        .error-msg { color: #dc3545; font-size: 0.8rem; margin-top: 8px; display: none; }
        
        /* Dashboard */
        #dashboard { display: none; }
        .admin-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 15px; background: white; padding: 12px 15px; border-radius: var(--radius-lg); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-header h1 { margin: 0; color: var(--green-dark); font-size: 1.2rem; }
        .admin-header-actions { display: flex; gap: 8px; }
        .admin-header-actions .btn-cta,
        .admin-header-actions .btn-outline-dark { font-size: 0.75rem; padding: 6px 12px; }
        
        /* Product Table */
        .table-wrapper { background: white; border-radius: var(--radius-lg); box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.78rem; }
        th { background: var(--green-light); color: var(--green-dark); font-weight: 600; white-space: nowrap; }
        td { color: var(--text-dark); }
        td img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
        .actions { display: flex; gap: 5px; }
        .btn-edit, .btn-delete { border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 600; }
        .btn-edit { background: var(--orange); color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .product-tag { font-size: 0.7rem; padding: 2px 6px; }
        
        /* Modal */
        #product-modal { display: none; }
        .modal-overlay { padding: 10px; }
        .modal-content { max-width: 600px; width: 100%; margin: 10px auto; max-height: 95vh; border-radius: 12px; }
        .modal-body { text-align: left; max-height: 75vh; overflow-y: auto; padding: 0 5px 5px; }
        .modal-body .form-group { margin-bottom: 10px; }
        .modal-body label { font-size: 0.8rem; margin-bottom: 3px; }
        .modal-body .form-control { font-size: 0.85rem; padding: 8px 10px; }
        .modal-body textarea.form-control { font-size: 0.8rem; }
        .modal-title { margin-bottom: 12px; font-size: 1.2rem; }
        .specs-header { margin: 12px 0 6px; border-bottom: 1px solid #ddd; padding-bottom: 4px; font-size: 0.95rem; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; min-width: 0; }
        
        /* Utils */
        .text-center { text-align: center; }
        .mt-15 { margin-top: 10px; }

        /* ========== MOBILE (< 600px) ========== */
        @media (max-width: 600px) {
            .admin-container { margin: 8px auto; padding: 6px; }
            
            /* Login */
            #login-screen { margin: 30px 10px; padding: 20px 15px; }
            #login-screen h2 { font-size: 1.2rem; }
            
            /* Header */
            .admin-header { flex-direction: column; align-items: stretch; padding: 10px 12px; gap: 8px; }
            .admin-header h1 { font-size: 1rem; text-align: center; }
            .admin-header-actions { justify-content: center; }
            .admin-header-actions .btn-cta,
            .admin-header-actions .btn-outline-dark { flex: 1; text-align: center; font-size: 0.72rem; padding: 7px 8px; }
            
            /* Table → Card layout on mobile */
            .table-wrapper { overflow: visible; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { background: white; margin-bottom: 8px; border-radius: 10px; padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; position: relative; }
            td { padding: 3px 0; border: none; display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }
            td:before { font-weight: 600; color: var(--green-dark); min-width: 60px; font-size: 0.7rem; }
            td:nth-child(1):before { content: ""; }
            td:nth-child(2):before { content: "ID:"; }
            td:nth-child(3):before { content: "Name:"; }
            td:nth-child(4):before { content: "Tag:"; }
            td:nth-child(5):before { content: "Price:"; }
            td:nth-child(6):before { content: ""; }
            td:nth-child(1) { justify-content: center; }
            td img { width: 50px; height: 50px; }
            td:last-child { justify-content: center; padding-top: 6px; }
            .actions { justify-content: center; width: 100%; }
            .btn-edit, .btn-delete { flex: 1; text-align: center; padding: 6px; font-size: 0.72rem; }
            
            /* Modal fullscreen on mobile */
            .modal-overlay { padding: 0; align-items: flex-start; }
            .modal-content { max-width: 100%; margin: 0; border-radius: 0 0 12px 12px; max-height: 100vh; }
            .modal-body { max-height: 82vh; padding: 0 2px; }
            .modal-body .form-group { margin-bottom: 8px; }
            .modal-body label { font-size: 0.75rem; }
            .modal-body .form-control { font-size: 0.8rem; padding: 7px 8px; }
            .form-row { flex-direction: column; gap: 0; }
            .specs-header { font-size: 0.85rem; }
            
            /* Image upload area compact */
            #img-upload-area { padding: 15px 10px; }
            #img-upload-area svg { width: 28px; height: 28px; }
            #img-upload-area p { font-size: 0.75rem !important; }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        
        <!-- LOGIN SCREEN -->
        <div id="login-screen">
            <h2>Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required title="Email Address" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required title="Password" placeholder="Enter password">
                </div>
                <button type="submit" class="btn-cta btn-full" id="login-btn">Log In</button>
                <div id="login-error" class="error-msg">Invalid login credentials.</div>
            </form>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="admin-header">
                <h1>Rice Catalog Manager</h1>
                <div class="admin-header-actions">
                    <button class="btn-cta" onclick="openModal()">+ Add Product</button>
                    <button class="btn-outline-dark" id="logout-btn">Log Out</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>ID / Key</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        <!-- Products loaded here -->
                        <tr><td colspan="5" class="text-center">Loading products...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- PRODUCT MODAL -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h3 id="modal-title" class="modal-title">Add New Product</h3>
            <div class="modal-body">
                <form id="product-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="p_id">Product ID (e.g. 1121_sella)</label>
                            <input type="text" id="p_id" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="p_name">Name (e.g. 1121 Basmati Sella)</label>
                            <input type="text" id="p_name" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="p_tag">Category Tag</label>
                            <input type="text" id="p_tag" class="form-control" placeholder="e.g. Basmati Rice" required>
                        </div>
                        <div class="form-group">
                            <label for="p_price">Price (e.g. $0.85 / kg)</label>
                            <input type="text" id="p_price" class="form-control" placeholder="e.g. $0.85 / kg">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <input type="text" id="p_img" class="form-control" placeholder="Auto-filled on upload or enter URL" required>
                        <div id="img-upload-area" style="margin-top:10px;border:2px dashed #4a7c59;border-radius:12px;padding:25px;text-align:center;cursor:pointer;background:#f0f7f2;transition:all 0.3s ease;">
                            <div id="img-upload-prompt">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4a7c59" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                                <p style="margin:8px 0 0;color:#4a7c59;font-weight:600;">Click or drag image here</p>
                                <p style="margin:4px 0 0;color:#888;font-size:0.8rem;">Auto-compressed to WebP • Max 400px width</p>
                            </div>
                            <div id="img-preview-box" style="display:none;">
                                <img id="img-preview" style="max-width:200px;max-height:150px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
                                <p id="img-size-info" style="margin:8px 0 0;color:#4a7c59;font-size:0.85rem;font-weight:600;"></p>
                                <button type="button" onclick="clearImageUpload()" style="margin-top:6px;background:#e74c3c;color:#fff;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;">✕ Remove</button>
                            </div>
                        </div>
                        <input type="file" id="img-file-input" accept="image/*" style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="p_short_desc">Short Description</label>
                        <input type="text" id="p_short_desc" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Detailed Description</label>
                        <textarea id="p_desc" class="form-control" rows="3" required></textarea>
                    </div>
                    
                    <h4 class="specs-header">Specifications (JSON Format)</h4>
                    <div class="form-group">
                        <label>Specs Data (Ensure valid JSON)</label>
                        <textarea id="p_specs" class="form-control" rows="4" placeholder='{"AGL": "8.30 mm", "Moisture": "12% Max"}' required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-cta btn-full mt-15" id="save-btn">Save Product</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/admin.js?v=6"></script>
</body>
</html>
