        .thankyou-section {

            background: linear-gradient(135deg, #f0f7f2 0%, #e8f5eb 50%, #fff 100%);
        }
        .thankyou-card {
            background: #fff;
            padding: 3.5rem 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 550px;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thankyou-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: bounce 1s ease infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        .thankyou-card h1 {
            font-family: var(--serif);
            font-size: 2.5rem;
            color: var(--green-dark);
            margin-bottom: 1rem;

            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .thankyou-card .highlight {

            font-weight: 600;
        }
        .thankyou-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .thankyou-actions a {
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-home {
            background: var(--green);
            color: #fff;
        }
        .btn-home:hover {
            background: var(--green-dark);
            transform: translateY(-2px);
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: translateY(-2px);
        }
    </style>
